{% extends "base.html" %}
{% block content %}

<h3>Recommendations</h3>

<table class="table table-bordered mt-3">
    <tr>
        <th>Type</th><th>Name</th><th>Author</th><th>Description</th>
    </tr>

    {% for c in records %}
    <tr>
        <td>{{ c["Enter media type"] }}</td>
        <td>{{ c["Name"] }}</td>
        <td>{{ c["Author"] }}</td>
        <td>{{ c["One line description"] }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
